benchmark: SPY
strategy:
  ema_fast: 20
  ema_slow: 50
  ema_bone: 9
  weekly_ema_fast: 20
  weekly_ema_slow: 50
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  rsi_length: 14
  rsi_threshold: 40
  mfi_length: 14
  mfi_threshold: 45
  atr_length: 14
  atr_multiplier: 1.5
  rs_lookback_days: 20
  rs_roc_days: 5
  vix_threshold: 30
  adx_length: 14
  adx_threshold: 10
  chandelier_lookback: 22
  chandelier_atr_mult: 3.0
  gap_threshold_pct: 0.5
  data_period_daily: 120d
  data_period_weekly: 2y
  data_period_h1: 5d
position_sizing:
  capital: 1000
  risk_per_trade: 0.02
  leverage: 5
  max_capital_pct: 0.4
alerts:
  go_threshold: 4
  watch_threshold: 3
  top_n: 5
session:
  timezone: US/Eastern
  market_open_utc: "14:30"
  orb_minutes: 15
output:
  save_csv: true
  csv_dir: output/reports_us
ai:
  provider: gemini
  model: gemini-3-flash-preview
  enabled: false
  max_tickers: 5
news:
  finnhub_lookback_hours: 48
  duckduckgo_max_results: 10
events:
