# ITA CFD Validator — runs at 8:30 CET (6:30 UTC summer / 7:30 UTC winter)
# Trigger manually from GitHub app with tickers, or on schedule with last saved config.
#
# Cron uses UTC. Set to 6:30 UTC = 8:30 CEST (summer). In winter runs at 7:30 CET (1h early, still fine).

name: ITA Validator

on:
  schedule:
    - cron: "30 6 * * 1-5"   # Mon-Fri 6:30 UTC → 8:30 CEST
  workflow_dispatch:
    inputs:
      tickers:
        description: "Tickers comma-separated (e.g. STLAM.MI,FCT.MI,ENI.MI)"
        required: false
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ITA validator
        run: |
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            python main_ita.py --config config_ita.yaml --tickers "${{ github.event.inputs.tickers }}"
          else
            python main_ita.py --config config_ita.yaml
          fi

      - name: Upload report CSV
        uses: actions/upload-artifact@v4
        with:
          name: ita-report-${{ github.run_id }}
          path: output/reports_ita/*.csv
          retention-days: 30
